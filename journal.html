<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quills Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-peach: #FAD6C3;
            --light-peach: #FFE5D9;
            --white: #FFFFFF;
            --dark-text: #333333;
            --accent: #E29578;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-body);
            color: var(--dark-text);
            padding: 3rem 5%;
            background-color: var(--white);
            margin: 0;
            animation: fadeIn 0.8s ease-in-out;
        }

        .section-title {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--dark-text);
        }

        .section-subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        /* Masonry Grid Setup */
        .masonry-grid {
            column-count: 3;
            column-gap: 2rem;
            padding-bottom: 2rem;
        }

        /* Journal Entry Cards */
        .journal-card {
            background-color: var(--white);
            border: 1px solid var(--light-peach);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            break-inside: avoid;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            position: relative;
        }

        .journal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(226, 149, 120, 0.15);
            border-color: var(--accent);
        }

        .tag {
            display: inline-block;
            background-color: var(--light-peach);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .journal-card h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--dark-text);
        }

        .author {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .excerpt {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-style: italic;
            color: #555;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .read-more {
            text-decoration: none;
            color: var(--dark-text);
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
        }

        .read-more:hover {
            color: var(--accent);
        }

        /* =========================================
           MODAL STYLES
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.open {
            opacity: 1; visibility: visible;
        }

        .modal-content {
            background: var(--white);
            width: 90%; max-width: 700px;
            max-height: 85vh; overflow-y: auto;
            padding: 3rem; border-radius: 12px;
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-modal {
            position: absolute; top: 1.5rem; right: 1.5rem;
            font-size: 2rem; cursor: pointer; color: var(--dark-text);
            background: none; border: none; transition: color 0.3s ease;
            line-height: 1;
        }

        .close-modal:hover { color: var(--accent); }

        .modal-title { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; 
            margin-bottom: 0.5rem; 
            color: var(--accent); 
        }

        .modal-author { 
            font-size: 1rem; 
            font-weight: 600; 
            margin-bottom: 2rem; 
            color: #666; 
        }

        .modal-body { 
            font-size: 1.1rem; 
            line-height: 1.8; 
            color: var(--dark-text); 
        }

        .modal-body p { margin-bottom: 1.2rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Columns & Modal Fixes */
        @media (max-width: 992px) {
            .masonry-grid { column-count: 2; }
        }
        
        @media (max-width: 768px) {
            body { padding: 1.5rem 5%; }
            .masonry-grid { column-count: 1; column-gap: 0; }
            .section-title { font-size: 2rem; }
            .journal-card { padding: 1.5rem; margin-bottom: 1.5rem; }
            
            /* Give the modal more breathing room on small screens */
            .modal-content { padding: 2rem 1.5rem; width: 95%; max-height: 90vh; }
            .modal-title { font-size: 1.8rem; padding-right: 20px; } /* Prevent overlap with close button */
            .close-modal { top: 1rem; right: 1rem; font-size: 1.8rem; }
        }
   
        /* CUSTOM SCROLLBAR & TEXT HIGHLIGHT */
        ::selection {
            background-color: var(--accent);
            color: var(--white);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--light-peach); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d17b5c; }

        /* MIDNIGHT READING MODE */
        body.dark-mode {
            --white: #121212;         
            --light-peach: #1E1E1E;   
            --soft-peach: #2A2A2A;    
            --dark-text: #EAEAEA;     
            --accent: #E29578;        
        }

        body.dark-mode .journal-card {
            border-color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Dark mode for Modal */
        body.dark-mode .modal-content {
            background: var(--soft-peach);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        body.dark-mode .close-modal { color: var(--dark-text); }
        body.dark-mode .modal-author { color: #AAA; }
    </style>
</head>
<body>

    <h2 class="section-title">The Quills Journal</h2>
    <p class="section-subtitle">A curated collection of poetry, prose, and thoughts from our brilliant minds.</p>

    <div class="masonry-grid" id="journal-container">
        <p style="text-align:center; grid-column: 1 / -1;">Loading journal entries...</p>
    </div>

    <div id="journal-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="window.closeModal()">&times;</button>
            <h2 class="modal-title" id="modal-title">Title</h2>
            <p class="modal-author" id="modal-author">By Author</p>
            <div class="modal-body" id="modal-body">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! PASTE YOUR FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAyYluyf-EKlKDbeKh1-GXyGZSy6P7vrz8",
            authDomain:"quills-society.firebaseapp.com",
            projectId: "quills-society",
            storageBucket:  "quills-society.firebasestorage.app",
            messagingSenderId: "905436200704",
            appId: "1:905436200704:web:b28a774331113acb783de5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "website", "content");

        // Attach global variables and functions to window for the HTML modal buttons to work
        window.journalDataGlobal = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().journal && docSnap.data().journal.length > 0) {
                    window.journalDataGlobal = docSnap.data().journal;
                    renderJournal(window.journalDataGlobal);
                } else {
                    document.getElementById('journal-container').innerHTML = "<p style='text-align:center; grid-column: 1 / -1;'>No journal entries published yet!</p>";
                }
            } catch (error) {
                console.error("Error loading journal from cloud:", error);
                document.getElementById('journal-container').innerHTML = "<p style='text-align:center; grid-column: 1 / -1; color: red;'>Failed to load journal. Please try again later.</p>";
            }
        });

        function renderJournal(journalArray) {
            const container = document.getElementById('journal-container');
            container.innerHTML = ''; 

            journalArray.forEach((entry, index) => {
                const journalHTML = `
                    <div class="journal-card">
                        <span class="tag">${entry.tag}</span>
                        <h3>${entry.title}</h3>
                        <p class="author">By ${entry.author}</p>
                        <p class="excerpt">${entry.excerpt}</p>
                        <button class="read-more" onclick="window.openModal(${index})">Read Full Piece →</button>
                    </div>
                `;
                container.innerHTML += journalHTML;
            });
        }

        window.openModal = function(index) {
            const entry = window.journalDataGlobal[index];
            document.getElementById('modal-title').innerText = entry.title;
            document.getElementById('modal-author').innerText = `By ${entry.author}`;
            document.getElementById('modal-body').innerHTML = entry.fullText || entry.excerpt;
            document.getElementById('journal-modal').classList.add('open');
            document.body.style.overflow = 'hidden'; 
        };

        window.closeModal = function() {
            document.getElementById('journal-modal').classList.remove('open');
            document.body.style.overflow = 'auto'; 
        };

        window.onclick = function(event) {
            const modal = document.getElementById('journal-modal');
            if (event.target === modal) {
                window.closeModal();
            }
        };
    </script>
</body>
</html>
