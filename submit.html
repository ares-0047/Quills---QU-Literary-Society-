<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Work | Quills</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-peach: #FAD6C3;
            --white: #FFFFFF;
            --dark-text: #333333;
            --accent: #E29578;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-body);
            color: var(--dark-text);
            background-color: var(--white);
            margin: 0;
            padding: 4rem 5%;
            animation: fadeIn 0.8s ease-in-out;
            display: flex;
            justify-content: center;
        }

        .submit-container {
            width: 100%;
            max-width: 700px;
            background-color: var(--soft-peach);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--dark-text);
        }

        p.subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-text);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent);
            color: var(--white);
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: #d17b5c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(226, 149, 120, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MIDNIGHT READING MODE */
        body.dark-mode {
            --white: #121212;         
            --soft-peach: #1E1E1E;    
            --dark-text: #EAEAEA;     
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background: #2A2A2A;
            color: var(--dark-text);
            border-color: #444;
        }
    </style>
</head>
<body>

    <div class="submit-container">
        <h2>Submit to The Quills Journal</h2>
        <p class="subtitle">Share your poetry, essays, and stories with the society.</p>

        <form id="submission-form">
            <div class="form-group">
                <label>Author Name</label>
                <input type="text" id="s-author" required placeholder="e.g. Jane Doe">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="s-tag" required>
                    <option value="Poetry">Poetry</option>
                    <option value="Short Story">Short Story</option>
                    <option value="Essay">Essay</option>
                </select>
            </div>

            <div class="form-group">
                <label>Title of Piece</label>
                <input type="text" id="s-title" required placeholder="e.g. Midnight Echoes">
            </div>

            <div class="form-group">
                <label>Short Excerpt (For the preview card)</label>
                <textarea id="s-excerpt" rows="2" required placeholder="A catchy 1-2 sentence hook from your piece..."></textarea>
            </div>

            <div class="form-group">
                <label>Full Text (Use &lt;p&gt; and &lt;br&gt; for formatting)</label>
                <textarea id="s-full" rows="8" required placeholder="<p>Your beautiful words go here...</p>"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Submit Piece for Review</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! PASTE YOUR FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAyYluyf-EKlKDbeKh1-GXyGZSy6P7vrz8",
            authDomain: "quills-society.firebaseapp.com",
            projectId: "quills-society",
            storageBucket: "quills-society.firebasestorage.app",
            messagingSenderId: "905436200704",
            appId: "1:905436200704:web:b28a774331113acb783de5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "website", "content");

        document.getElementById('submission-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Submitting...";
            btn.disabled = true;

            try {
                // Fetch existing data
                const docSnap = await getDoc(docRef);
                let siteData = docSnap.exists() ? docSnap.data() : {};
                
                // Ensure the pending list exists
                if (!siteData.pendingJournal) siteData.pendingJournal = [];

                // Push new submission to the pending list
                siteData.pendingJournal.push({
                    tag: document.getElementById('s-tag').value,
                    title: document.getElementById('s-title').value,
                    author: document.getElementById('s-author').value,
                    excerpt: document.getElementById('s-excerpt').value,
                    fullText: document.getElementById('s-full').value,
                    link: "comingsoon.html",
                    submittedAt: new Date().toLocaleDateString()
                });

                // Save back to cloud
                await setDoc(docRef, siteData);
                
                // Success UI
                document.getElementById('submission-form').reset();
                btn.innerText = "Success! Submitted for Review";
                btn.style.backgroundColor = "#10b981"; // Green
                
                setTimeout(() => {
                    btn.innerText = "Submit Another Piece";
                    btn.disabled = false;
                    btn.style.backgroundColor = "var(--accent)";
                }, 4000);

            } catch (error) {
                console.error("Error submitting:", error);
                alert("Failed to submit. Please check your connection.");
                btn.innerText = "Submit Piece for Review";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
