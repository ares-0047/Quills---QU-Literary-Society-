<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-peach: #FAD6C3;
            --light-peach: #FFE5D9;
            --white: #FFFFFF;
            --dark-text: #333333;
            --accent: #E29578;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-body);
            color: var(--dark-text);
            padding: 3rem 5%;
            background-color: var(--white);
            animation: fadeIn 0.8s ease-in-out;
            margin: 0;
        }

        .section-title {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 2rem;
            border-left: 3px solid var(--accent);
        }

        .event-item {
            position: relative;
            margin-bottom: 3rem;
            padding-left: 2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
        }

        .event-item::before {
            content: '';
            position: absolute;
            left: -2.45rem; 
            top: 0;
            width: 20px;
            height: 20px;
            background-color: var(--white);
            border: 4px solid var(--accent);
            border-radius: 50%;
        }

        .event-card {
            background-color: var(--white);
            border: 1px solid var(--light-peach);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }

        .event-card:hover {
            transform: translateX(10px);
            box-shadow: 0 8px 25px rgba(226, 149, 120, 0.15);
        }

        .event-date {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .event-card h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .event-card p {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .register-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--white);
            background: linear-gradient(135deg, var(--accent), #d17b5c);
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .register-btn:hover {
            box-shadow: 0 0 15px var(--accent);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            .section-title { font-size: 2rem; margin-bottom: 2rem; }
            .timeline { padding-left: 1.5rem; margin-left: 10px; }
            .event-item { padding-left: 1rem; margin-bottom: 2rem;}
            .event-item::before { left: -2rem; width: 14px; height: 14px; border-width: 3px; }
            .event-card { padding: 1.5rem; }
        }

        body.dark-mode {
            --white: #121212;         
            --light-peach: #1E1E1E;   
            --soft-peach: #2A2A2A;    
            --dark-text: #EAEAEA;     
            --accent: #E29578;        
        }

        body.dark-mode .event-card {
            border-color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <h2 class="section-title">Upcoming Events</h2>

    <div class="timeline" id="events-container">
        <p style="text-align:center;">Loading events...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! PASTE YOUR FIREBASE CONFIG HERE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAyYluyf-EKlKDbeKh1-GXyGZSy6P7vrz8",
            authDomain: "quills-society.firebaseapp.com",
            projectId:  "quills-society",
            storageBucket: "quills-society.firebasestorage.app",
            messagingSenderId: "905436200704",
            appId: "1:905436200704:web:b28a774331113acb783de5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "website", "content");

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().events && docSnap.data().events.length > 0) {
                    renderEvents(docSnap.data().events);
                } else {
                    document.getElementById('events-container').innerHTML = "<p style='text-align:center;'>No upcoming events right now!</p>";
                }
            } catch (error) {
                console.error("Error loading events from cloud:", error);
                document.getElementById('events-container').innerHTML = "<p style='text-align:center; color: red;'>Failed to load events. Please try again later.</p>";
            }
        });

        function renderEvents(eventsArray) {
            const container = document.getElementById('events-container');
            container.innerHTML = ''; 
            
            eventsArray.forEach((event, index) => {
                const delay = (index * 0.2) + 0.1; 
                const eventHTML = `
                    <div class="event-item" style="animation-delay: ${delay}s; opacity: 1; transform: translateY(0);">
                        <div class="event-card">
                            <div class="event-date">${event.date}</div>
                            <h3>${event.title}</h3>
                            <p>${event.description}</p>
                            <a href="${event.link}" class="register-btn">${event.btnText}</a>
                        </div>
                    </div>
                `;
                container.innerHTML += eventHTML;
            });
        }
    </script>
</body>
</html>
